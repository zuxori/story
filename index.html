<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zu X Ori</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      padding: 0 15px;
      background: #1a1a1a; /* Soft dark gray */
      color: #f0f0f0;      /* Soft off-white */
      font-family: 'Roboto', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .title {
      font-size: 4rem;
      line-height: 1.1em;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: -2px;
    }
    .subtitle {
      font-size: 1.1rem;
      margin-top: 20px;
      font-weight: 400;
      opacity: 0.9;
      letter-spacing: 1px;
    }
    .footer {
      position: absolute;
      bottom: 25px;
      font-size: 0.9rem;
    }
    a {
      color: #d0d0d0;
      text-decoration: none; /* underline removed */
    }

    @media (max-width: 600px) {
      .title {
        font-size: 2.5rem;
      }
      .subtitle {
        font-size: 0.9rem;
        margin-top: 15px;
      }
      .footer {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <div class="title">
    Zu X Ori
  </div>

  <div class="subtitle">
    The Reincarnation Sequel to Romeo + Juliet
  </div>

  <div class="footer">
    <a href="https://github.com/zuxori/story">View on GitHub</a>
  </div>

</body>
</html>
